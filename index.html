<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Interactive Globe</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="globe-container"></div>

  <div id="search-box">
    <div class="search-icon">&#128269;</div>
    <input type="text" id="search-input" placeholder="搜索国家 / Search country..." autocomplete="off" />
    <div id="search-results" class="hidden"></div>
  </div>

  <!-- Hover card (lightweight) -->
  <div id="hover-card" class="hidden">
    <div id="hover-header">
      <span id="hover-flag"></span>
      <div>
        <h3 id="hover-name-zh"></h3>
        <span id="hover-name-en"></span>
      </div>
    </div>
    <div id="hover-capital-row">
      <span class="hover-label">首都</span>
      <span id="hover-capital"></span>
    </div>
    <div id="hover-photo-wrap">
      <img id="hover-photo" src="" alt="" />
    </div>
    <div id="hover-hint">点击查看详情</div>
  </div>

  <!-- Click detail panel (full info) -->
  <div id="detail-panel" class="hidden">
    <button id="detail-close" title="关闭">&times;</button>
    <div id="detail-header">
      <span id="detail-flag"></span>
      <div>
        <h2 id="detail-name-zh"></h2>
        <h3 id="detail-name-en"></h3>
      </div>
    </div>
    <div id="detail-photos">
      <img id="detail-photo-1" class="detail-photo" src="" alt="" />
    </div>
    <div id="detail-body">
      <div class="detail-row"><span class="detail-label">首都</span><span id="detail-capital"></span></div>
      <div class="detail-row"><span class="detail-label">人口</span><span id="detail-population"></span></div>
      <div class="detail-row"><span class="detail-label">面积</span><span id="detail-area"></span></div>
      <div class="detail-row"><span class="detail-label">语言</span><span id="detail-language"></span></div>
      <div class="detail-row"><span class="detail-label">坐标</span><span id="detail-coordinates"></span></div>
      <div class="detail-row"><span class="detail-label">时区</span><span id="detail-timezone"></span></div>
      <div class="detail-row"><span class="detail-label">气候</span><span id="detail-climate"></span></div>
      <div class="detail-row"><span class="detail-label">地形</span><span id="detail-terrain"></span></div>
      <div class="detail-row"><span class="detail-label">GDP</span><span id="detail-gdp"></span></div>
      <div class="detail-row"><span class="detail-label">货币</span><span id="detail-currency"></span></div>
      <div class="detail-row"><span class="detail-label">文化特色</span><span id="detail-culture"></span></div>
    </div>
  </div>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p>加载中...</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
